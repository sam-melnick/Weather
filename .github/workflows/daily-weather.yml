name: Daily Weather Update

on:
  schedule:
    - cron: '30 08 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run weather agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_PATH: index.html
        run: python weather_agent.py

      - name: Commit and push updated forecast
        run: |
          git config user.name "Weather Bot"
          git config user.email "weather-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update weather forecast - $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase
          git push
